    <script>
      // Function to generate chessboard squares dynamically
      function generateSquares() {
        const svgChessboard = document.getElementById('chessboard');
        const squareSize = 50;
        const colors = {
          dark: 'orange',
          light: 'blue'
        };
        for (let x = 0; x < 25; x++) {
          for (let y = 0; y < 25; y++) {
            const fill = (x + y) % 2 === 0 ? colors.light : colors.dark;
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', x * squareSize);
            rect.setAttribute('y', y * squareSize);
            rect.setAttribute('width', squareSize);
            rect.setAttribute('height', squareSize);
            rect.setAttribute('fill', fill);
            rect.classList.add(fill === colors.dark ? 'dark' : 'light');
            svgChessboard.appendChild(rect);
          }
        }
      }
      // Call the function to generate chessboard squares
      generateSquares();
    </script>
  </svg>

  <script>
    // Function to make chess pieces draggable
    function makeChessPiecesDraggable() {
      const pieces = document.querySelectorAll('.piece');
      pieces.forEach(piece => {
        // Prevent default drag behavior
        piece.addEventListener('dragstart', function(e) {
          e.preventDefault();
        });
        piece.addEventListener('mousedown', startDragging);
        piece.addEventListener('mouseup', stopDragging);
      });
      let activePiece = null;
      let initialX;
      let initialY;

      function startDragging(e) {
        activePiece = this;
        initialX = e.clientX - activePiece.getBoundingClientRect().left;
        initialY = e.clientY - activePiece.getBoundingClientRect().top;
      }

      function stopDragging() {
        activePiece = null;
      }
      document.addEventListener('mousemove', dragPiece);

      function dragPiece(e) {
        if (activePiece) {
          e.preventDefault();
          const x = e.clientX - initialX;
          const y = e.clientY - initialY;
          activePiece.style.left = `${x}px`;
          activePiece.style.top = `${y}px`;
        }
      }
    }
    // Function to add a new chess piece
    function addChessPiece(pieceSrc, altText) {
      const container = document.getElementById('piecesContainer');
      const newPiece = document.createElement('img');
      newPiece.src = pieceSrc;
      newPiece.alt = altText;
      newPiece.className = 'piece';
      newPiece.style.left = '0px'; // Set initial position
      newPiece.style.top = '0px'; // Set initial position
      container.appendChild(newPiece);
      makeChessPiecesDraggable(); // Make the new piece draggable
    }
    // Example usage:
    document.getElementById('addBishopButton').addEventListener('click', function() {
      addChessPiece('pieces/white_bishop.svg', 'White Bishop');
    });
    document.getElementById('addRookButton').addEventListener('click', function() {
      addChessPiece('pieces/white_rook.svg', 'White Rook');
    });
    document.getElementById('addKnightButton').addEventListener('click', function() {

    });

    });
    document.getElementById('addPawnButton').addEventListener('click', function() {
      addChessPiece('pieces/white_pawn.svg', 'White Pawn');

      // Select light and dark rectangles separately
      const lightRectangles = document.querySelectorAll('.light');
